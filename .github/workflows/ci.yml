name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── SDK: lint + test ────────────────────────────────────────────────────
  sdk:
    name: SDK (lint + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: sdk/pyproject.toml

      - name: Install SDK + dev deps
        run: pip install -e "sdk/[dev]" ruff

      - name: Lint (ruff)
        run: ruff check sdk/loupe/

      - name: Test (pytest)
        run: pytest sdk/tests/ -q

  # ── Server: lint ────────────────────────────────────────────────────────
  server:
    name: Server (lint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install deps + ruff
        run: pip install -r server/requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check server/app/

  # ── Dashboard: lint + build ─────────────────────────────────────────────
  dashboard:
    name: Dashboard (lint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: dashboard

      - name: Lint (eslint)
        run: npm run lint
        working-directory: dashboard

      - name: Build
        run: npm run build
        working-directory: dashboard
        env:
          # Dummy values so Next.js build doesn't fail on missing env vars
          LOUPE_API_URL: http://localhost:8000
          LOUPE_API_KEY: lp_ci_dummy
